name: Publish NPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build:lib

      - name: Guard publish branch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Publish workflow_dispatch must run from main branch."
          echo "Current ref: $GITHUB_REF"
          exit 1

      - name: Debug OIDC claims
        run: |
          RAW="$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          TOKEN="$(echo "$RAW" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')"
          PAYLOAD="$(echo "$TOKEN" | cut -d '.' -f2)"
          PAYLOAD="$(echo "$PAYLOAD" | tr '_-' '/+' | awk '{ l=length($0)%4; if (l==2) print $0"=="; else if (l==3) print $0"="; else print $0 }')"
          echo "OIDC claims used for npm trusted publishing:"
          echo "$PAYLOAD" | base64 -d

      - name: Resolve npm dist-tag
        id: npm_tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="$(node -p "const v=require('./package.json').version; const m=v.match(/-([0-9A-Za-z.-]+)$/); if (!m) { 'latest' } else { m[1].split('.')[0] }")"
          echo "Version: $VERSION"
          echo "Using npm tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish --access public --provenance --tag "${{ steps.npm_tag.outputs.tag }}"
