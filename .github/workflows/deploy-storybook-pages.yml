name: Deploy Storybook Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Verify Pages is enabled
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info(`GitHub Pages is enabled for ${owner}/${repo}.`);
            } catch (error) {
              const status = error.status ?? "unknown";
              const msg = [
                `GitHub Pages is not accessible for ${owner}/${repo} (status: ${status}).`,
                "Enable Pages once in repository settings:",
                "1) Settings > Pages",
                "2) Build and deployment > Source: GitHub Actions",
                "3) Re-run this workflow",
                "Note: auto-enablement requires admin permission and can fail for integration tokens."
              ].join("\n");
              core.setFailed(msg);
            }

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
